x-no-public-api: true
x-no-public-api-reason: >-
  Fidelity Investments does not publish a public developer portal, OpenAPI
  specifications, retail brokerage API, or self-serve partner API documentation.
  Fidelity Institutional / Wealthscape and the Fidelity Marketplace surface
  vetted third-party integrations to advisors and retail clients, but the
  underlying connections are arranged through institutional onboarding and BD
  agreements rather than a public API program.
